[project]
name = "document-ir"
version = "0.0.0"
description = "Canonical Document IR schema + validators (PRD2 §6.1)"
requires-python = ">=3.12"
dependencies = ["pydantic>=2.7"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["document_ir"]
