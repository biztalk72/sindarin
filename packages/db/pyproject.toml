[project]
name = "hybrid-idp-db"
version = "0.0.0"
description = "SQLAlchemy 2.0 relational model for the metadata store (PRD2 §6.2)"
requires-python = ">=3.12"
dependencies = ["sqlalchemy>=2.0", "psycopg[binary]>=3.2", "hybrid-idp-shared"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["db"]
