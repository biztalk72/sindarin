[project]
name = "rag-core"
version = "0.0.0"
description = "Retrieval, reranking, citation logic, PageIndex structure aid (ADR-0008)"
requires-python = ">=3.12"
dependencies = ["pydantic>=2.7", "document-ir", "hybrid-idp-shared", "qdrant-client>=1.12"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["rag_core"]
