# Staging stack (PRD2 §13). Mirror of prod with pushed images, but publishes the Postgres
# port for debugging and uses .env.staging. Used for smoke + eval-gate before prod approval.
name: hybrid-idp-staging

x-restart: &restart
  restart: unless-stopped

x-worker: &worker
  <<: *restart
  env_file: ../../.env.staging
  depends_on: [postgres, object-store, vector-db]
  mem_limit: 8g

services:
  web:
    <<: *restart
    image: ${REGISTRY:-registry.example.com/hybrid-idp}/web:${IMAGE_TAG:-staging}
    ports: ["${WEB_PORT:-3000}:3000"]
    environment:
      API_PROXY_TARGET: http://api:8000
    depends_on: [api]

  api:
    <<: *restart
    image: ${REGISTRY:-registry.example.com/hybrid-idp}/api:${IMAGE_TAG:-staging}
    ports: ["${API_PORT:-8000}:8000"]
    env_file: ../../.env.staging
    depends_on: [postgres, object-store, vector-db]
    mem_limit: 4g

  postgres:
    <<: *restart
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hybrid_idp}
      POSTGRES_USER: ${POSTGRES_USER:-hybrid_idp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hybrid_idp}
    ports: ["${POSTGRES_PUBLISHED_PORT:-5432}:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-hybrid_idp}"]
      interval: 10s
      timeout: 5s
      retries: 5

  object-store:
    <<: *restart
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${OBJECT_STORE_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${OBJECT_STORE_SECRET_KEY:-minioadmin}
    volumes: ["miniodata:/data"]

  vector-db:
    <<: *restart
    image: qdrant/qdrant:latest
    volumes: ["qdrantdata:/qdrant/storage"]

  worker-markitdown: { <<: *worker, image: "${REGISTRY:-registry.example.com/hybrid-idp}/worker-markitdown:${IMAGE_TAG:-staging}" }
  worker-ocr:        { <<: *worker, image: "${REGISTRY:-registry.example.com/hybrid-idp}/worker-ocr:${IMAGE_TAG:-staging}" }
  worker-hwpx:       { <<: *worker, image: "${REGISTRY:-registry.example.com/hybrid-idp}/worker-hwpx:${IMAGE_TAG:-staging}" }
  worker-embedding:  { <<: *worker, image: "${REGISTRY:-registry.example.com/hybrid-idp}/worker-embedding:${IMAGE_TAG:-staging}" }
  worker-eval:       { <<: *worker, image: "${REGISTRY:-registry.example.com/hybrid-idp}/worker-eval:${IMAGE_TAG:-staging}" }

volumes:
  pgdata:
  miniodata:
  qdrantdata:
