# Production stack (PRD2 §3, §13). Deploys pre-built, pushed images (no local build) —
# REGISTRY + IMAGE_TAG come from the CI/CD pipeline. GB10 single node; restart=always,
# per-service memory caps, Postgres not published to the host. Secrets via .env.prod.
name: hybrid-idp-prod

x-restart: &restart
  restart: always

x-worker: &worker
  <<: *restart
  env_file: ../../.env.prod
  depends_on: [postgres, object-store, vector-db]
  mem_limit: 8g

services:
  web:
    <<: *restart
    image: ${REGISTRY:-registry.example.com/hybrid-idp}/web:${IMAGE_TAG:-latest}
    ports: ["${WEB_PORT:-3000}:3000"]
    environment:
      API_PROXY_TARGET: http://api:8000
    depends_on: [api]

  api:
    <<: *restart
    image: ${REGISTRY:-registry.example.com/hybrid-idp}/api:${IMAGE_TAG:-latest}
    ports: ["${API_PORT:-8000}:8000"]
    env_file: ../../.env.prod
    depends_on: [postgres, object-store, vector-db]
    mem_limit: 4g

  postgres:
    <<: *restart
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hybrid_idp}
      POSTGRES_USER: ${POSTGRES_USER:-hybrid_idp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set in .env.prod}
    volumes: ["pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-hybrid_idp}"]
      interval: 10s
      timeout: 5s
      retries: 5

  object-store:
    <<: *restart
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${OBJECT_STORE_ACCESS_KEY:?set in .env.prod}
      MINIO_ROOT_PASSWORD: ${OBJECT_STORE_SECRET_KEY:?set in .env.prod}
    volumes: ["miniodata:/data"]

  vector-db:
    <<: *restart
    image: qdrant/qdrant:latest
    volumes: ["qdrantdata:/qdrant/storage"]

  worker-markitdown: { <<: *worker, image: "${REGISTRY:-registry.example.com/hybrid-idp}/worker-markitdown:${IMAGE_TAG:-latest}" }
  worker-ocr:        { <<: *worker, image: "${REGISTRY:-registry.example.com/hybrid-idp}/worker-ocr:${IMAGE_TAG:-latest}" }
  worker-hwpx:       { <<: *worker, image: "${REGISTRY:-registry.example.com/hybrid-idp}/worker-hwpx:${IMAGE_TAG:-latest}" }
  worker-embedding:  { <<: *worker, image: "${REGISTRY:-registry.example.com/hybrid-idp}/worker-embedding:${IMAGE_TAG:-latest}" }
  worker-eval:       { <<: *worker, image: "${REGISTRY:-registry.example.com/hybrid-idp}/worker-eval:${IMAGE_TAG:-latest}" }

volumes:
  pgdata:
  miniodata:
  qdrantdata:
