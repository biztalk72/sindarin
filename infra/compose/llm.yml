# Self-hosted OpenAI-compatible LLM stack for the GB10 node (ADR-0001). Overlay — use WITH the
# app stack so the api reaches these by service name on the shared network:
#
#   docker compose --env-file .env -f infra/compose/dev.yml -f infra/compose/llm.yml up -d
#
# Then in .env (in-network URLs — no host IP needed):
#   OPENAI_BASE_URL=http://vllm-chat:8000/v1     ANSWER_MODEL=qwen2.5-14b
#   EMBEDDING_BASE_URL=http://vllm-embed:8000/v1 EMBEDDING_MODEL=bge-m3  EMBEDDING_DIM=1024
#
# GB10 = Grace Blackwell (aarch64 + Blackwell GPU): use vLLM images with sm_100 support.
# Models download once into the shared hf-cache volume.
name: hybrid-idp

x-vllm: &vllm
  image: ${VLLM_IMAGE:-vllm/vllm-openai:latest}
  restart: unless-stopped
  volumes: ["hf-cache:/root/.cache/huggingface"]
  shm_size: "8gb"
  deploy:
    resources:
      reservations:
        devices:
          - driver: nvidia
            count: all
            capabilities: [gpu]

services:
  vllm-chat:
    <<: *vllm
    entrypoint: ["vllm", "serve"]
    command:
      - "${CHAT_MODEL:-Qwen/Qwen2.5-14B-Instruct}"
      - "--served-model-name"
      - "${ANSWER_MODEL:-qwen2.5-14b}"
      - "--api-key"
      - "${OPENAI_API_KEY:?set OPENAI_API_KEY in .env}"
      - "--max-model-len"
      - "${VLLM_MAX_LEN:-8192}"
      - "--gpu-memory-utilization"
      - "${VLLM_CHAT_GPU_UTIL:-0.45}"
      - "--port"
      - "8000"
    ports: ["${VLLM_CHAT_PORT:-8001}:8000"]
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request;urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 30s
      timeout: 5s
      retries: 20
      start_period: 600s   # model load can take minutes on first run

  vllm-embed:
    <<: *vllm
    entrypoint: ["vllm", "serve"]
    command:
      - "${EMBED_MODEL:-BAAI/bge-m3}"
      - "--task"
      - "embed"
      - "--served-model-name"
      - "${EMBEDDING_MODEL:-bge-m3}"
      - "--api-key"
      - "${OPENAI_API_KEY:?set OPENAI_API_KEY in .env}"
      - "--gpu-memory-utilization"
      - "${VLLM_EMBED_GPU_UTIL:-0.10}"
      - "--port"
      - "8000"
    ports: ["${VLLM_EMBED_PORT:-8082}:8000"]
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request;urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 30s
      timeout: 5s
      retries: 20
      start_period: 600s

  # ----------------------------------------------------------------------------
  # Nemotron Phase 0 staging — measurement only, no app traffic (docs/runbooks/nemotron-phase0.md)
  # Brought up explicitly: `docker compose ... up -d vllm-chat-staging`
  # Operational vllm-chat stays at 0.45 util, vllm-embed at 0.10 → staging gets 0.30 (headroom 0.15).
  # ----------------------------------------------------------------------------
  vllm-chat-staging:
    <<: *vllm
    entrypoint: ["vllm", "serve"]
    command:
      - "${STAGING_CHAT_MODEL:-nvidia/Llama-3.1-Nemotron-Nano-8B-v1}"
      - "--served-model-name"
      - "${STAGING_ANSWER_MODEL:-nemotron-nano-8b}"
      - "--api-key"
      - "${OPENAI_API_KEY:?set OPENAI_API_KEY in .env}"
      - "--max-model-len"
      - "${STAGING_VLLM_MAX_LEN:-8192}"
      - "--gpu-memory-utilization"
      - "${STAGING_VLLM_GPU_UTIL:-0.30}"
      - "--port"
      - "8000"
    ports: ["${STAGING_VLLM_CHAT_PORT:-8011}:8000"]
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request;urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 30s
      timeout: 5s
      retries: 20
      start_period: 600s
    profiles: ["staging"]

volumes:
  hf-cache:
